<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordem de Produção</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; }
    header { background:#111; color:#fff; padding:20px; text-align:center; font-size:24px; font-weight:bold; }
    .container { max-width:1000px; margin:auto; padding:20px; }
    .card { background:#fff; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    h2 { margin-top:0; }
    input, textarea { width:100%; padding:8px; margin-top:5px; border-radius:5px; border:1px solid #ccc; }
    textarea { resize:vertical; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
    .checklist-item { display:flex; align-items:center; margin-top:10px; gap:10px; width:100%; }
    .checklist-item input[type="text"] { flex:1; min-width:200px; padding:8px; border:1px solid #ccc; border-radius:5px; background:#fff; }
    button { margin-top:10px; padding:8px 12px; border:none; border-radius:5px; background:#007bff; color:#fff; cursor:pointer; }
    .remove-btn { background:red; margin-left:10px; }
  </style>
</head>
<body>

<header>Ordem de Produção 3/8 Filmes</header>

<div class="container">

  <div class="card">
    <h2>Informações do Projeto</h2>
    <div class="grid">
      <div>
        <label>Nome do Projeto</label>
        <input id="projeto" oninput="save()">
      </div>
      <div>
        <label>Cliente</label>
        <input id="cliente" oninput="save()">
      </div>
      <div>
        <label>Data</label>
        <input type="date" id="data" oninput="save()">
      </div>
      <div>
        <label>Responsável</label>
        <input id="responsavel" oninput="save()">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Checklist - Filmagem</h2>
    <div id="checklist"></div>
    <button onclick="addItem()">Adicionar Item</button>
  </div>

  <div class="card">
    <h2>Equipamentos</h2>
    <div id="equipamentos"></div>
    <button onclick="addEquip()">Adicionar Equipamento</button>
  </div>

  <div class="card">
    <h2>Observações</h2>
    <textarea id="obs" oninput="save()"></textarea>
  </div>

  <div class="card">
    <button onclick="window.print()">🖨️ Exportar / Imprimir</button>
  </div>

</div>

<script>
function addItem(text='', checked=false) {
  const div = document.createElement('div');
  div.className='checklist-item';

  const cb = document.createElement('input');
  cb.type='checkbox'; cb.checked=checked; cb.onchange=save;

  const input = document.createElement('input');
  input.type='text'; input.value=text; input.oninput=save;

  const btn = document.createElement('button');
  btn.textContent='X'; btn.className='remove-btn';
  btn.onclick=()=>{ div.remove(); save(); };

  div.append(cb,input,btn);
  document.getElementById('checklist').appendChild(div);
}

function addEquip(text='') {
  const div = document.createElement('div');
  div.className='checklist-item';

  const input = document.createElement('input');
  input.type='text'; input.value=text; input.oninput=save;

  const btn = document.createElement('button');
  btn.textContent='X'; btn.className='remove-btn';
  btn.onclick=()=>{ div.remove(); save(); };

  div.append(input,btn);
  document.getElementById('equipamentos').appendChild(div);
}

function save(){
  const data={
    projeto:projeto.value,
    cliente:cliente.value,
    data:dataInput.value,
    responsavel:responsavel.value,
    obs:obs.value,
    checklist:[...document.querySelectorAll('#checklist .checklist-item')].map(i=>({
      text:i.children[1].value,
      checked:i.children[0].checked
    })),
    equipamentos:[...document.querySelectorAll('#equipamentos input')].map(i=>i.value)
  };
  localStorage.setItem('op',JSON.stringify(data));
}

function load(){
  const d=JSON.parse(localStorage.getItem('op')||'{}');
  projeto.value=d.projeto||'';
  cliente.value=d.cliente||'';
  dataInput.value=d.data||'';
  responsavel.value=d.responsavel||'';
  obs.value=d.obs||'';

  (d.checklist||[]).forEach(i=>addItem(i.text,i.checked));
  (d.equipamentos||[]).forEach(e=>addEquip(e));
}

const projeto=document.getElementById('projeto');
const cliente=document.getElementById('cliente');
const dataInput=document.getElementById('data');
const responsavel=document.getElementById('responsavel');
const obs=document.getElementById('obs');

load();
</script>

</body>
</html>
