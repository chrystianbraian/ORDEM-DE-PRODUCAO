<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordem de Produção</title>

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; }

header { background:#111; color:#fff; padding:15px; text-align:center; }

.container { max-width:1000px; margin:auto; padding:15px; }

.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }

input, textarea, select {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#007bff;
  color:#fff;
  cursor:pointer;
  width:100%;
}

.acao { width:100%; }

.checklist-item { display:flex; gap:10px; margin-top:10px; }

@media(min-width:768px){
  button { width:auto; }
}

/* Impressão */
@media print{
  body { background:#fff; }
  button { display:none !important; }
  .card { margin-bottom:5px; padding:10px; }
}
</style>
</head>

<body>

<header>Ordem de Produção</header>

<div class="container">

<div class="card">
<h2>Informações</h2>
<input id="numeroProducao" placeholder="N° Produção" oninput="save()">
<input id="projeto" placeholder="Projeto" oninput="save()">
<input id="cliente" placeholder="Cliente" oninput="save()">
<input type="date" id="data" oninput="save()">
<input id="responsavel" placeholder="Responsável" oninput="save()">
</div>

<div class="card">
<h2>Quantidade de Vídeos</h2>
<select id="quantVideos" onchange="save()">
<option value="">Selecione</option>
<script>
for(let i=1;i<=20;i++){
document.write(`<option>${i}</option>`);
}
</script>
</select>
</div>

<div class="card">
<h2>Duração</h2>
<select id="duracaoSelect" multiple onchange="save()" size="3">
<option>05s</option>
<option>15s</option>
<option>30s</option>
<option>45s</option>
<option>60s</option>
<option>1:30min</option>
<option>2 min</option>
<option>Tempo indeterminado</option>
</select>
</div>

<div class="card">
<h2>Formato</h2>
<label><input type="checkbox" value="vertical" onchange="save()"> Vertical</label><br>
<label><input type="checkbox" value="horizontal" onchange="save()"> Horizontal</label>
</div>

<div class="card">
<h2>Briefing</h2>
<textarea id="briefing" oninput="save()"></textarea>
</div>

<div class="card">
<h2>Equipamentos</h2>
<div id="equipamentos"></div>
<button onclick="addEquip()">Adicionar</button>
</div>

<div class="card">
<h2>Observações</h2>
<textarea id="observacoes" oninput="save()"></textarea>
</div>

<div class="card">
<h2>Localização e Contato</h2>

<label>Endereço</label>
<input id="endereco" oninput="save()">

<button class="acao" onclick="abrirMapa()">📍 Abrir no Maps</button>

<label style="margin-top:10px;">Telefone</label>
<input id="telefone" oninput="save()">

<button class="acao" onclick="abrirWhats()">💬 Abrir WhatsApp</button>

</div>

<div class="card">
<button onclick="window.print()">🖨️ Imprimir</button>
<button onclick="gerarLink()">🔗 Gerar e copiar link</button>
<input id="link" readonly>
</div>

</div>

<script>
const endereco = document.getElementById('endereco');
const telefone = document.getElementById('telefone');
const link = document.getElementById('link');

function addEquip(text=''){
  const div = document.createElement('div');
  div.className='checklist-item';

  const input = document.createElement('input');
  input.value=text;
  input.oninput=save;

  const btn = document.createElement('button');
  btn.textContent='X';
  btn.onclick=()=>{div.remove(); save();};

  div.append(input,btn);
  equipamentos.appendChild(div);
}

function abrirMapa(){
  if(endereco.value){
    window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(endereco.value));
  }
}

function abrirWhats(){
  if(telefone.value){
    window.open('https://wa.me/' + telefone.value);
  }
}

function save(){
  const data={
    numeroProducao:numeroProducao.value,
    projeto:projeto.value,
    cliente:cliente.value,
    data:data.value,
    responsavel:responsavel.value,
    endereco:endereco.value,
    telefone:telefone.value,
    briefing:briefing.value,
    observacoes:observacoes.value,
    quantVideos:quantVideos.value,
    duracao:[...duracaoSelect.selectedOptions].map(o=>o.value),
    formato:[...document.querySelectorAll('input[type=checkbox]:checked')].map(i=>i.value),
    equipamentos:[...document.querySelectorAll('#equipamentos input')].map(i=>i.value)
  };
  localStorage.setItem('op',JSON.stringify(data));
}

function gerarLink(){
  const data = localStorage.getItem('op');
  if(!data) return alert('Nada para compartilhar!');

  const encoded = btoa(unescape(encodeURIComponent(data)));
  const url = location.origin + location.pathname + '?view=' + encoded;

  link.value = url;

  navigator.clipboard.writeText(url).then(() => {
    mostrarAviso('🔗 Link copiado!');
  }).catch(() => {
    link.select();
    document.execCommand('copy');
    mostrarAviso('🔗 Link copiado!');
  });
}

function mostrarAviso(msg){
  const aviso = document.createElement('div');
  aviso.textContent = msg;
  aviso.style.position = 'fixed';
  aviso.style.bottom = '20px';
  aviso.style.left = '50%';
  aviso.style.transform = 'translateX(-50%)';
  aviso.style.background = '#333';
  aviso.style.color = '#fff';
  aviso.style.padding = '10px 20px';
  aviso.style.borderRadius = '5px';

  document.body.appendChild(aviso);
  setTimeout(()=>aviso.remove(),2000);
}

function aplicarModoLeitura(){
  document.querySelectorAll('input, textarea, select').forEach(el=>el.disabled=true);

  document.querySelectorAll('#equipamentos input').forEach(el=>el.disabled=false);

  document.querySelectorAll('button:not(.acao)').forEach(b=>b.style.display='none');
}

function load(){
  const params=new URLSearchParams(location.search);
  const view=params.get('view');

  if(view){
    const d=JSON.parse(decodeURIComponent(escape(atob(view))));
    preencher(d);
    aplicarModoLeitura();
    return;
  }

  const d=JSON.parse(localStorage.getItem('op')||'{}');
  preencher(d);
}

function preencher(d){
  numeroProducao.value=d.numeroProducao||'';
  projeto.value=d.projeto||'';
  cliente.value=d.cliente||'';
  data.value=d.data||'';
  responsavel.value=d.responsavel||'';
  endereco.value=d.endereco||'';
  telefone.value=d.telefone||'';
  briefing.value=d.briefing||'';
  observacoes.value=d.observacoes||'';
  quantVideos.value=d.quantVideos||'';

  [...duracaoSelect.options].forEach(o=>{
    o.selected=d.duracao?.includes(o.value);
  });

  (d.equipamentos||[]).forEach(addEquip);
}

load();
</script>

</body>
</html>
