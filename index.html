<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordem de Produção</title>

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; }
header { background:#111; color:#fff; padding:15px; text-align:center; }
.container { max-width:1000px; margin:auto; padding:15px; }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; }

input, textarea, select {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#007bff;
  color:#fff;
  cursor:pointer;
}

.acao { width:100%; }

/* EQUIPAMENTOS */
#equipamentos {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 20px;
}

.checklist-item {
  display:flex;
  align-items:center;
  gap:10px;
  background:#f9f9f9;
  padding:8px;
  border-radius:6px;
}

input[readonly] {
  background:#eee;
  cursor:not-allowed;
  opacity:0.8;
}

.checklist-item button {
  width:35px;
  padding:5px;
}

@media(max-width:600px){
  #equipamentos { grid-template-columns: 1fr; }
}

/* DURAÇÃO */
.duracao-item {
  padding:10px;
  margin-top:5px;
  background:#eee;
  border-radius:6px;
  cursor:pointer;
}

.duracao-item.selected {
  background:#007bff;
  color:#fff;
  font-weight:bold;
}

#duracaoResumo { cursor:pointer; }

@media print{
  button { display:none !important; }
}
</style>
</head>

<body>

<header>Ordem de Produção</header>

<div class="container">

<div class="card">
<h2>Informações</h2>
<input id="numeroProducao" placeholder="N° Produção" oninput="save()">
<input id="projeto" placeholder="Projeto" oninput="save()">
<input id="cliente" placeholder="Cliente" oninput="save()">
<input type="date" id="data" oninput="save()">
<input id="responsavel" placeholder="Responsável" oninput="save()">
</div>

<div class="card">
<h2>Quantidade de Vídeos</h2>
<select id="quantVideos" onchange="save()">
<option value="">Selecione</option>
<script>
for(let i=1;i<=20;i++){
document.write(`<option>${i}</option>`);
}
</script>
</select>
</div>

<div class="card">
<h2>Duração</h2>
<input id="duracaoResumo" placeholder="Clique para selecionar" readonly onclick="toggleDuracao()">

<div id="duracaoBox" style="display:none;">
<div class="duracao-item" data-value="05s" onclick="toggleItem(this,event)">05s</div>
<div class="duracao-item" data-value="15s" onclick="toggleItem(this,event)">15s</div>
<div class="duracao-item" data-value="30s" onclick="toggleItem(this,event)">30s</div>
<div class="duracao-item" data-value="45s" onclick="toggleItem(this,event)">45s</div>
<div class="duracao-item" data-value="60s" onclick="toggleItem(this,event)">60s</div>
<div class="duracao-item" data-value="1:30min" onclick="toggleItem(this,event)">1:30min</div>
<div class="duracao-item" data-value="2 min" onclick="toggleItem(this,event)">2 min</div>
<div class="duracao-item" data-value="indeterminado" onclick="toggleItem(this,event)">Tempo indeterminado</div>
</div>
</div>

<div class="card">
<h2>Formato</h2>
<label><input type="checkbox" value="vertical" onchange="save()"> Vertical</label><br>
<label><input type="checkbox" value="horizontal" onchange="save()"> Horizontal</label>
</div>

<div class="card">
<h2>Briefing</h2>
<textarea id="briefing" oninput="save()"></textarea>
</div>

<div class="card">
<h2>Equipamentos</h2>
<div id="equipamentos"></div>
<button onclick="addEquip()">Adicionar</button>
<button onclick="selecionarTodos()">✔ Selecionar todos</button>
</div>

<div class="card">
<h2>Observações</h2>
<textarea id="observacoes" oninput="save()"></textarea>
</div>

<div class="card">
<h2>Localização e Contato</h2>

<label>Endereço</label>
<input id="endereco" oninput="save()">
<button class="acao" onclick="abrirMapa()">📍 Abrir no Maps</button>

<label style="margin-top:10px;">Telefone</label>
<input id="telefone" oninput="save()">
<button class="acao" onclick="abrirWhats()">💬 Abrir WhatsApp</button>

</div>

<div class="card">
<button onclick="window.print()">🖨️ Imprimir</button>
<button onclick="gerarLink()">🔗 Gerar e copiar link</button>
<input id="link" readonly>
</div>

</div>

<script>

let duracoesSelecionadas = [];

const listaPadrao = [
"CAMERA + BATERIAS + CARTÃO DE MEMÓRIA",
"DUMMY","CARREGADOR DE BATERIA","POWERBANK",
"LENTE 17-70MM","LENTE 50MM","LENTE 28MM",
"MICROFONE HOLLYLAND (MOEDA)","MICROFONE HOLLYLAND",
"MICROFONE COMICA","GRAVADOR DE AUDIO ZOOM H5N",
"LED PORTÁTIL","SOPRADOR POEIRA (FUC FUC)",
"ILUMINAÇÃO COMPLETA","KIT TRIPÉS COMPLETO",
"PROLONGAS","CASE CABOS"
];

function toggleDuracao(){
  duracaoBox.style.display = duracaoBox.style.display==='none'?'block':'none';
}

function toggleItem(el,e){
  e.stopPropagation();
  const v = el.dataset.value;

  if(duracoesSelecionadas.includes(v)){
    duracoesSelecionadas = duracoesSelecionadas.filter(x=>x!==v);
    el.classList.remove('selected');
  } else {
    duracoesSelecionadas.push(v);
    el.classList.add('selected');
  }

  duracaoResumo.value = duracoesSelecionadas.join(', ');
  save();
}

document.addEventListener('click', function(e){
  if(duracaoBox.style.display==='block' &&
     !duracaoBox.contains(e.target) &&
     !duracaoResumo.contains(e.target)){
    duracaoBox.style.display='none';
    save();
  }
});

function addEquip(text='', check=false, fixo=false){
  const div = document.createElement('div');
  div.className='checklist-item';

  const c = document.createElement('input');
  c.type='checkbox';
  c.checked=check;
  c.onchange=save;

  const input = document.createElement('input');
  input.value=text;
  input.oninput=save;

  if(fixo) input.readOnly=true;

  const btn = document.createElement('button');
  btn.textContent='X';
  btn.onclick=()=>{div.remove(); save();};

  if(fixo) btn.style.display='none';

  div.append(c,input,btn);
  equipamentos.appendChild(div);
}

function selecionarTodos(){
  const c = document.querySelectorAll('#equipamentos input[type=checkbox]');
  const all = [...c].every(x=>x.checked);
  c.forEach(x=>x.checked=!all);
  save();
}

function abrirMapa(){
  if(endereco.value){
    window.open('https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(endereco.value));
  }
}

function abrirWhats(){
  let t = telefone.value.replace(/\D/g,'');
  if(t){
    window.open('https://wa.me/'+t);
  }
}

function save(){
  const dados = {
    numeroProducao: numeroProducao.value,
    projeto: projeto.value,
    cliente: cliente.value,
    data: data.value,
    responsavel: responsavel.value,
    quantVideos: quantVideos.value,
    duracao: duracoesSelecionadas,
    formato: [...document.querySelectorAll('input[type=checkbox]:checked')].map(i=>i.value),
    briefing: briefing.value,
    observacoes: observacoes.value,
    endereco: endereco.value,
    telefone: telefone.value,
    equipamentos: [...document.querySelectorAll('#equipamentos .checklist-item')].map(i=>({
      nome: i.querySelector('input[type=text]').value,
      check: i.querySelector('input[type=checkbox]').checked
    }))
  };

  localStorage.setItem('op', JSON.stringify(dados));
}

/* 🔥 CORRIGIDO */
function gerarLink(){
  save();

  const data = localStorage.getItem('op');
  if(!data) return alert('Preencha algo primeiro');

  const encoded = btoa(encodeURIComponent(data));
  const url = location.origin + location.pathname + '?view=' + encoded;

  link.value = url;

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(url)
      .then(() => mostrarAviso('🔗 Link copiado!'))
      .catch(() => fallbackCopy(url));
  } else {
    fallbackCopy(url);
  }
}

function fallbackCopy(text) {
  const input = document.getElementById('link');
  input.removeAttribute('readonly');
  input.select();
  document.execCommand('copy');
  input.setAttribute('readonly', true);
  mostrarAviso('🔗 Link copiado!');
}

function mostrarAviso(msg){
  const aviso = document.createElement('div');
  aviso.textContent = msg;
  aviso.style.position = 'fixed';
  aviso.style.bottom = '20px';
  aviso.style.left = '50%';
  aviso.style.transform = 'translateX(-50%)';
  aviso.style.background = '#333';
  aviso.style.color = '#fff';
  aviso.style.padding = '10px 20px';
  aviso.style.borderRadius = '5px';
  document.body.appendChild(aviso);
  setTimeout(()=>aviso.remove(),2000);
}

function load(){
  const p = new URLSearchParams(location.search).get('view');
  let d={};

  if(p){
    d = JSON.parse(decodeURIComponent(atob(p)));
  } else {
    d = JSON.parse(localStorage.getItem('op')||'{}');
  }

  preencher(d);

  if(!d.equipamentos || d.equipamentos.length===0){
    listaPadrao.forEach(i=>addEquip(i,false,true));
  }
}

function preencher(d){
  numeroProducao.value=d.numeroProducao||'';
  projeto.value=d.projeto||'';
  cliente.value=d.cliente||'';
  data.value=d.data||'';
  responsavel.value=d.responsavel||'';
  quantVideos.value=d.quantVideos||'';
  briefing.value=d.briefing||'';
  observacoes.value=d.observacoes||'';
  endereco.value=d.endereco||'';
  telefone.value=d.telefone||'';

  duracoesSelecionadas=d.duracao||[];
  duracaoResumo.value=duracoesSelecionadas.join(', ');

  equipamentos.innerHTML='';
  (d.equipamentos||[]).forEach(eq=>{
    const fixo = listaPadrao.includes(eq.nome);
    addEquip(eq.nome, eq.check, fixo);
  });
}

load();
</script>

</body>
</html>
